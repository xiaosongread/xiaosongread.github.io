ent">// 监听连接打开事件</span></span><br><span class="line">  socketTask.onOpen(<span class="function">(<span class="params">res</span>) =&gt;</span> &#123;</span><br><span class="line">    <span class="built_in">console</span>.log(<span class="string">"WebSocket-监听连接打开事件"</span>);</span><br><span class="line">    isConnect = <span class="literal">true</span>; <span class="comment">// 更新连接状态</span></span><br><span class="line">    reconnectCount = <span class="number">0</span>; <span class="comment">// 重置重连计数</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 发送登录命令</span></span><br><span class="line">    <span class="keyword">let</span> loginInfo = &#123;</span><br><span class="line">      cmd: <span class="number">0</span>, <span class="comment">// 登录命令标识</span></span><br><span class="line">      data: &#123;</span><br><span class="line">        accessToken: accessToken,</span><br><span class="line">      &#125;,</span><br><span class="line">    &#125;;</span><br><span class="line"></span><br><span class="line">    socketTask.send(&#123;</span><br><span class="line">      data: <span class="built_in">JSON</span>.stringify(loginInfo),</span><br><span class="line">    &#125;);</span><br><span class="line">  &#125;);</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 监听消息接收事件</span></span><br><span class="line">  socketTask.onMessage(<span class="function">(<span class="params">res</span>) =&gt;</span> &#123;</span><br><span class="line">    <span class="keyword">let</span> sendInfo = <span class="built_in">JSON</span>.parse(res.data); <span class="comment">// 解析接收到的消息</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">if</span> (sendInfo.cmd == <span class="number">0</span>) &#123;</span><br><span class="line">      <span class="comment">// 登录成功命令</span></span><br><span class="line">      heartCheck.start(); <span class="comment">// 开始心跳检查</span></span><b <span class="line">  <span class="keyword">if</span> (socketTask) &#123;</span><br><span class="line">    socketTask.close(<span class="number">3099</span>); <span class="comment">// 3099为自定义关闭代码，表示重连关闭</span></span><br><span class="line">  &#125;</span><br><span class="line">  <span class="built_in">console</span>.log(<span class="string">"尝试重新连接"</span>);</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 如果已连接，则不再重连</span></span><br><span class="line">  <span class="keyword">if</span> (isConnect) &#123;</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 计算距离上次连接的时间差，确保至少间隔10秒重连，避免频繁重连</span></span><br><span class="line">  <span class="keyword">let</span> timeDiff = <span class="keyword">new</span> <span class="built_in">Date</span>().getTime() - lastConnectTime.getTime();</span><br><span class="line">  <span class="keyword">let</span> delay = timeDiff &lt; <span class="number">10000</span> ? <span class="number">10000</span> - timeDiff : <span class="number">0</span>;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 清除之前的重连定时器</span></span><br><span class="line">  rec &amp;&amp; clearTimeout(rec);</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 设置新的重连定时器</span></span><br><span class="line">  rec = setTimeout(<span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">    connect(wsurl, accessToken); <span class="comment">// 执行连接操作</span></span><br><span class="line">  &#125;, delay);</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 关闭WebSocket连接</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@param <span class="type">&#123;number&#125;</span> <span class="variable">code</span></span> - 关闭代码（参考WebSocket规范）</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="keyword">let</span> close = <span class="function">(<span class="params">code</span>) =&gt;</span> &#123;</span><br><span class="line">  <span class="comment">// 如果未连接或没有socketTask，则直接返回</span></span><br><span class="line">  <span class="keyword">if</span> (!isConnect || !socketTask) &#123;</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 关闭WebSocket连接</span></span><br><span class="line">  socketTask.close(&#123;</span><br><span class="line">    code: code, <span class="comment">// 关闭代码</span></span><br><span class="line">    complete: <span class="function">(<span class="params">res</span>) =&gt;</span> &#123;</span><br><span class="line">      <span class="comment">// 关闭完成回调</span></span><br><span class="line">      isConnect = <span class="literal">false</span>; <span class="comment">// 更新连接状态</span></span><br><span class="line">      socketTask = <span class="literal">null</span>; <span class="comment">// 清空socketTask引用</span></span><br><span class="line">      heartCheck.clear(); <span class="comment">// 清除心跳检查</span></span><br><span class="line">      <span class="built_in">console</span>.log(<span class="string">"关闭websocket连接"</span>);</span><br><span class="line">    &#125;,</span><br><span class="line">    fail: <span class="function">(<span class="params">e</span>) =&gt;</span> &#123;</span><br><span class="line">      <span class="comment">// 关闭失败回调</span></span><br><span class="line">      <span class="built_in">console</span>.log(<span class="string">"关闭websocket连接失败"</span>, e);</span><br><span class="line">      isConnect = <span class="literal">false</span>; <span cla class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 处理WebSocket重连逻辑</span></span><br><span class="line"><span class="comment"> * 实现指数退避策略，避免频繁重连，并限制最大重连次数</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">handleReconnect</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">  <span class="comment">// 检查是否达到最大重连次数</span></span><br><span class="line">  <span class="keyword">if</span> (reconnectCount &gt;= MAX_RECONNECT_COUNT) &#123;</span><br><span class="line">    <span class="built_in">console</span>.error(<span class="string">"达到最大重连次数，停止重连"</span>);</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 增加重连次数</span></span><br><span class="line">  reconnectCount++;</span><br><span class="line">  <span class="comment">// 计算重连延迟时间（指数退避策略），最大不超过30秒</span></span><br><span class="line">  <span class="keyword">const</span> delay = <span class="built_in">Math</span>.min(RECONNECT_INTERVAL * reconnectCount, <span class="number">30000</span>);</span><br><span class="line"></span><br><span class="line">  <span class="built_in">console</span>.log(<span class="string">`<span class="subst">$&#123;reconnectCount&#125;</span>秒后尝试第<span class="subst">$&#123;reconnectCount&#125;</span>次重连...`</span>);</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 清除之前的重连定时器</span></span><br><span class="line">  clearTimeout(reconnectTimer);</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 设置新的重连定时器</span></span><br><span class="line">  reconnectTimer = setTimeout(<span class="function"><span class="params">()</span> =&gt;</span> &#123;</span><br><span class="line">    <span class="comment">// 只有在未连接且有WebSocket地址时才尝试重连</span></span><br><span class="line">    <span class="keyword">if</span> (!isConnect &amp;&amp; wsurl) &#123;</span><br><span class="line">      <span class="built_in">console</span>.log(<span class="string">`开始第<span class="subst">$&#123;reconnectCount&#125;</span>次重连`</span>);</span><br><span class="line">      connect(wsurl, accessToken); <span class="comment">// 执行连接操作</span></span><br><span class="line">    &#125;</span><br><span class="line">  &#125;, delay);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 发送WebSocket消息</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@param <span class="type">&#123;string|object&#125;</span> <span class="variable">message</span></span> - 要发送的消息，可以是字符串或对象</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@returns <span class="type">&#123;boolean&#125;</span> </span>- 消息发送是否成功</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="keyword">let</span> sendMessage = <span class="function">(<span class="params">message</span>) =&gt;</span> &#123;</span><br><span class="line">  <span class="comment">// 检查连接状态和socketTask是否存在</span></span><br><span class="line">  <span class="keyword">if</span> (!isConnect || !socketTask) &#123;</span><br><span class="line">    <span class="built_in">console</span>.error(<span class="string">"WebSocket未连接，消息发送失败"</span>);</span><br><span class="line">    <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">try</span> &#123;</span><br><span class="line">    <span class="comment">// 发送消息</span></span><br><span class="line">    socketTask.send(&#123;</span><br><span class="line">      <span class="comment">// 如果消息是对象，则转换为JSON字符串</span></span><br><span class="line">      data: <span class="keyword">typeof</span> message === <span class="string">"object"</span> ? <span class="built_in">JSON</span>.stringify(message) : message,</span><br><span class="line">      success: <span class="function"><span class="params">()</span> =&gt;</span> &#123;</span><br><span class="line">        isConnect = <span class="literal">true</span>; <span class="comment">// 更新连接状态</span></span><br><span class="line">        <span class="built_in">console</span>.log(<span class="string">"消息发送成功"</span>, message);</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">      &#125;,</span><br><span class="line">      fail: <span class="function">(<span class="params">err</span>) =&gt;</span> &#123;</span><br><span class="line">        isConnect = <span class="literal">false</span>; <span class="comment">// 更新连接状态</span></span><br><span class="line">        <span class="built_in">console</span>.error(<span class="string">"消息发送失败:"</span>, err);</span><br><span class="line">        <span class="comment">// 发送失败时尝试重连</span></span><br><span class="line">        handleReconnect();</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">      &#125;,</span><br><span class="line">    &#125;);</span><br><span class="line">  &#125; <span class="keyword">catch</span> (error) &#123;</span><br><span class="line">    <span class="built_in">console</span>.error(<span class="string">"消息发送异常:"</span>, error);</span><br><span class="line">    <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 设置WebSocket连接成功回调函数</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@param <span class="type">&#123;function&#125;</span> <span class="variable">callback</span></span> - 连接成功时触发的回调函数</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="keyword">let</span> onConnect = <span class="function">(<span class="params">callback</span>) =&gt;</span> &#123;</span><br><span class="line">  connectCallBack = callback;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 设置WebSocket消息接收回调函数</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@param <span class="type">&#123;function&#125;</span> <span class="variable">callback</span></span> - 接收消息时触发的回调函数，参数为(cmd, data)</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="keyword">let</span> onMessage = <span class="function">(<span class="params">callback</span>) =&gt;</span> &#123;</span><br><span class="line">  messageCallBack = callback;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 设置WebSocket连接关闭回调函数</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@param <span class="type">&#123;function&#125;</span> <span class="variable">callback</span></span> - 连接关闭时触发的回调函数，参数为关闭原因</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="keyword">let</span> onClose = <span class="function">(<span class="params">callback</span>) =&gt;</span> &#123;</span><br><span class="line">  heartCheck.clear();</span><br><span class="line">  closeCallBack = callback;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 获取WebSocket连接状态</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@returns <span class="type">&#123;boolean&#125;</span> </span>- 当前连接状态，true表示已连接，false表示未连接</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="keyword">let</span> getConnectStatus = <span class="function"><span class="params">()</span> =&gt;</span> &#123;</span><br><span class="line">  <span class="keyword">return</span> isConnect;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 导出方法</span></span><br><span class="line"><span class="keyword">export</span> &#123;</span><br><span class="line">  connect,</span><br><span class="line">  reconnect,</span><br><span class="line">  close,</span><br><span class="line">  sendMessage,</span><br><span class="line">  onConnect,</span><br><span class="line">  onMessage,</span><br><span class="line">  onClose,</span><br><span class="line">  getConnectStatus,</span><br><span class="line">  isConnect,</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>

                nodes.aside.removeClass('mobile-close panel-show');
            }
            doing = false;
        });
        $('#open-panel, #aside-mask').on('click', function() {
            if (doing) {
                return;

            if (nodes.aside.hasClass('panel-show')) {
                nodes.aside.addClass('mobile-close');
            } else {
                nodes.aside.addClass('mobile-open panel-show');
            }
        });
        $('#open-menus').on('click', function() {
            nodes.navInner.slideToggle('normal', slideDone);
        });

        if (window.innerWidth <= 960) {
            setTimeout(function() {
                nodes.navInner.slideUp('normal', slideDone);
            }, 3000);
        }

        function slideDone() {
            if (nodes.navInner.css('display') !== 'none') {
                nodes.navInner.css('display', '');
            }
        }

        $(window).on('resize', function() {
            console.log($(this).width())
            if ($(this).width() > 960) {
                nodes.navInner.css('display', '');
            }
        });
    });
